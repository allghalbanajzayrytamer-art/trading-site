<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenix Trading</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#0b0f19;
    color:white;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#111827;
    position:sticky;
    top:0;
}

nav a{
    color:white;
    margin:0 10px;
    text-decoration:none;
}

nav a:hover{
    color:#facc15;
}

/* SECTION */
.section{
    padding:20px;
}

/* CARD */
.card{
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    border:1px solid #1f2937;
}

/* BUTTON */
.btn{
    display:inline-block;
    padding:10px 15px;
    background:#facc15;
    color:black;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

/* SIGNAL */
.signal{
    background:#111827;
    padding:12px;
    border-radius:10px;
    margin:8px 0;
}

.buy{border-left:5px solid #22c55e;}
.sell{border-left:5px solid #ef4444;}

/* CHART */
#chart{
    height:380px;
    margin:10px;
    border-radius:12px;
    overflow:hidden;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    font-size:12px;
    color:#9ca3af;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div style="color:#facc15;font-weight:bold;">Zenix 🚀</div>
    <div>
        <a href="index.html">الرئيسية</a>
        <a href="blog.html">المقالات</a>
        <a href="signals.html">الإشارات</a>
       <a href="academy.html">🎓 التعلم</a>
        <a href="start-trading.html">تعلم</a>
    </div>
</nav>

<!-- CHART -->
<div id="chart"></div>

<!-- WELCOME -->
<div class="section">
    <div class="card">
        <h2>🔥 مرحبا بك في Zenix Trading</h2>
        <p>منصة تعليم التداول للمبتدئين</p>
        <a class="btn" href="start-trading.html">ابدأ التعلم</a>
    </div>
</div>

<!-- ARTICLES -->
<div class="section">
    <h3 style="color:#facc15">📚 مقالات</h3>

    <div class="card">
        <h3>أساسيات التداول</h3>
        <p>تعلم أول خطوات الدخول للسوق...</p>
        <a class="btn" href="blog.html">اقرأ</a>
    </div>
</div>

<!-- SIGNALS -->
<div class="section">
    <h3 style="color:#facc15">📡 إشارات</h3>

    <div class="signal buy">🟢 BUY - EUR/USD</div>
    <div class="signal sell">🔴 SELL - BTC/USD</div>
</div>

<!-- CONTACT -->
<div class="section">
    <div class="card">
        <h3>📞 تواصل</h3>
        <a class="btn" href="https://wa.me/213663190202">واتساب</a>
    </div>
</div>

<footer>
© 2026 Zenix Trading
</footer>

<script>
new TradingView.widget({
    width:"100%",
    height:380,
    symbol:"BINANCE:BTCUSDT",
    theme:"dark",
    container_id:"chart"
});
</script>

</html>
