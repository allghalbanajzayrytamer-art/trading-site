<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Amine Trading Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f19;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:12px 18px;
  background:#111827;
  position:sticky;
  top:0;
}

.logo{
  color:#facc15;
  font-weight:bold;
}

/* TICKER LIVE */
.ticker{
  display:flex;
  gap:10px;
  overflow:auto;
  padding:10px;
  background:#0f172a;
}

.coin{
  background:#111827;
  padding:10px;
  border-radius:10px;
  min-width:140px;
  font-size:14px;
}

/* CHART */
#chart{
  padding:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
  padding:12px;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
}

/* PROFILE */
.profile{
  padding:12px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  background:#111827;
  color:gray;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Amine Trading Platform 🚀</div>
  <div>LIVE MARKET</div>
</div>

<div class="ticker">
  <div class="coin" id="btc">BTC: loading...</div>
  <div class="coin" id="eth">ETH: loading...</div>
  <div class="coin" id="bnb">BNB: loading...</div>
</div>

<div id="chart"></div>

<script>
new TradingView.widget({
  "container_id":"chart",
  "width":"100%",
  "height":500,
  "symbol":"BINANCE:BTCUSDT",
  "interval":"15",
  "theme":"dark",
  "style":"1"
});
</script>

<h3 style="padding-left:12px;color:#facc15;">Market Overview</h3>

<div class="grid">
  <div class="card">Bitcoin Analysis</div>
  <div class="card">Ethereum Trend</div>
  <div class="card">Gold Safe Asset</div>
  <div class="card">Forex Market</div>
</div>

<div class="profile">
  <h3>👑 Amine Profile</h3>
  <p>Facebook: Amine ov</p>
  <p>Phone: +213 663 190 202</p>
</div>

<footer>
© Amine Trading Platform
</footer>

<script>
async function loadPrices(){
  const res = await fetch("https://api.binance.com/api/v3/ticker/price");
  const data = await res.json();

  function find(symbol){
    return data.find(x => x.symbol === symbol)?.price;
  }

  document.getElementById("btc").innerText = "BTC: $" + find("BTCUSDT");
  document.getElementById("eth").innerText = "ETH: $" + find("ETHUSDT");
  document.getElementById("bnb").innerText = "BNB: $" + find("BNBUSDT");
}

loadPrices();
setInterval(loadPrices, 5000);
</script>

</body>
</html>
