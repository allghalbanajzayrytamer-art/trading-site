<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeX Pro Ultimate</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>
body{
margin:0;
font-family:Inter,sans-serif;
background:#0b0f1a;
color:#fff;
overflow-x:hidden;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#0f172a;
padding:20px;
}

.logo{
font-weight:800;
color:#00ff99;
font-size:20px;
margin-bottom:30px;
}

.nav-item{
padding:12px;
margin:8px 0;
border-radius:8px;
cursor:pointer;
color:#cbd5e1;
}

.nav-item:hover{background:#111827;color:white;}

.main{
margin-left:240px;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
}

.card-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
border:1px solid #1f2937;
}

.green{color:#00ff99;}
.red{color:#ff4d4d;}

.chart-box{
margin-top:20px;
background:#111827;
padding:20px;
border-radius:12px;
}

.trade-box{
margin-top:20px;
background:#111827;
padding:20px;
border-radius:12px;
display:flex;
gap:20px;
}

.trade-panel,.order-book{flex:1;}

.order-book{
background:#0f172a;
padding:15px;
border-radius:12px;
}

button{
background:#00ff99;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:600;
margin:5px 0;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
background:#0b0f1a;
color:white;
}

.modal{
position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);
display:flex;align-items:center;justify-content:center;
}

.modal-box{
background:#111827;padding:25px;border-radius:12px;width:300px;
}

.toast{
position:fixed;
bottom:20px;
right:20px;
background:#00ff99;
color:black;
padding:10px 15px;
border-radius:8px;
display:none;
}
</style></head><body><div class="toast" id="toast">Order Executed</div><!-- LOGIN --><div class="modal" id="loginModal">
  <div class="modal-box">
    <h3>Login</h3>
    <input id="user" placeholder="Username">
    <button onclick="login()">Enter</button>
  </div>
</div><div class="sidebar">
<div class="logo">TRADEX PRO</div>
<div class="nav-item">📊 Dashboard</div>
<div class="nav-item">💰 Wallet</div>
<div class="nav-item">📈 Markets</div>
<div class="nav-item">⚙ Settings</div>
</div><div class="main"><div class="topbar">
<h2>Live Crypto Terminal</h2>
<button onclick="startLive()">Start Live Mode</button>
</div><div class="card-grid">
<div class="card">BTC/USDT<br><b class="green" id="btc">Loading...</b></div>
<div class="card">ETH/USDT<br><b class="red" id="eth">Loading...</b></div>
<div class="card">XAU/USD<br><b class="green" id="gold">+0.76%</b></div>
<div class="card">Balance<br><b id="balance">$0</b></div>
</div><div class="chart-box">
<h3>Market Chart (Simulated)</h3>
<canvas id="chart"></canvas>
</div><div class="trade-box">
<div class="trade-panel">
<h3>Trade</h3>
<input id="amount" placeholder="Amount $">
<button onclick="buy()">BUY</button>
<button onclick="sell()" style="background:#ff4d4d;color:white;">SELL</button>
</div><div class="order-book">
<h3>Orders</h3>
<div id="orders"></div>
</div>
</div></div><script>

// LOCAL STORAGE LOGIN
function login(){
 let u=document.getElementById('user').value;
 if(!u) return;
 localStorage.setItem('user',u);
 document.getElementById('loginModal').style.display='none';
 loadUser();
}

function loadUser(){
 let user=localStorage.getItem('user');
 if(!user){
 document.getElementById('loginModal').style.display='flex';
 }
}

let balance=parseFloat(localStorage.getItem('balance')||10000);

document.getElementById('balance').innerText="$"+balance.toFixed(2);

function saveBalance(){
 localStorage.setItem('balance',balance);
}

// LIVE PRICES FROM COINGECKO
async function loadPrices(){
 try{
 let res=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd');
 let data=await res.json();

 document.getElementById('btc').innerText="$"+data.bitcoin.usd;
 document.getElementById('eth').innerText="$"+data.ethereum.usd;
 }catch(e){
 document.getElementById('btc').innerText="error";
 }
}

// CHART
const ctx=document.getElementById('chart');
let chart=new Chart(ctx,{type:'line',data:{labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],datasets:[{label:'BTC',data:[42000,43000,42800,44000,45000,46000,45500],borderColor:'#00ff99',tension:0.3}]},options:{plugins:{legend:{labels:{color:'white'}}},scales:{x:{ticks:{color:'white'}},y:{ticks:{color:'white'}}}}});

function startLive(){
setInterval(()=>{
 chart.data.datasets[0].data=chart.data.datasets[0].data.map(x=>x+(Math.random()*500-250));
 chart.update();
 loadPrices();
},3000);
}

function buy(){
let amt=parseFloat(document.getElementById('amount').value||0);
balance+=amt;
saveBalance();
document.getElementById('balance').innerText='$'+balance.toFixed(2);
addOrder('BUY',amt);
showToast('BUY EXECUTED');
}

function sell(){
let amt=parseFloat(document.getElementById('amount').value||0);
balance-=amt;
saveBalance();
document.getElementById('balance').innerText='$'+balance.toFixed(2);
addOrder('SELL',amt);
showToast('SELL EXECUTED');
}

function addOrder(t,a){
let d=document.createElement('div');
d.innerText=t+' $'+a;
document.getElementById('orders').prepend(d);
}

function showToast(m){
let t=document.getElementById('toast');
t.innerText=m;
t.style.display='block';
setTimeout(()=>t.style.display='none',2000);
}

loadUser();
loadPrices();

</script></body>
</html>
