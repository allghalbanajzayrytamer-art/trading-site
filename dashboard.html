<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#0b0f19;
    color:white;
}

header{
    background:#111827;
    padding:15px;
    text-align:center;
    color:#facc15;
    font-weight:bold;
}

.container{
    padding:20px;
}

/* cards */
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.card{
    background:#111827;
    padding:15px;
    border-radius:15px;
    border:1px solid #1f2937;
    text-align:center;
}

.card h2{
    color:#facc15;
    margin:0;
}

.card p{
    color:#9ca3af;
    font-size:14px;
}

/* progress */
.progress{
    background:#1f2937;
    border-radius:10px;
    height:15px;
    margin-top:10px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:40%;
    background:#22c55e;
}

/* buttons */
.btn{
    display:inline-block;
    margin-top:10px;
    padding:8px 12px;
    background:#facc15;
    color:black;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

/* signals */
.signal{
    background:#111827;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    border-left:5px solid #22c55e;
    font-size:14px;
}
</style>
</head>

<body>

<header>
📊 Dashboard - Zenix Trading
</header>

<div class="container">

    <!-- STATS -->
    <div class="grid">

        <div class="card">
            <h2>📚 9</h2>
            <p>الدروس المتاحة</p>
        </div>

        <div class="card">
            <h2>🎓 Beginner</h2>
            <p>مستواك الحالي</p>
        </div>

    </div>

    <!-- PROGRESS -->
    <div class="card" style="margin-top:15px;">
        <h2>📈 تقدمك</h2>
        <p>40% مكتمل</p>

        <div class="progress">
            <div class="bar"></div>
        </div>
    </div>

    <!-- QUICK LINKS -->
    <div class="card" style="margin-top:15px;">
        <h2>🚀 الدخول السريع</h2>

        <a class="btn" href="academy.html">🎓 الأكاديمية</a>
        <a class="btn" href="blog.html">📚 المقالات</a>
        <a class="btn" href="signals.html">📡 الإشارات</a>
    </div>

    <!-- SIGNALS -->
    <div class="card" style="margin-top:15px;">
        <h2>📡 آخر الإشارات</h2>

        <div class="signal">🟢 BUY - EUR/USD</div>
        <div class="signal" style="border-left-color:#ef4444;">🔴 SELL - BTC/USD</div>

    </div>

</div>

</body>
</html>
