<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenix Blog</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#0b0f19;
    color:white;
}

header{
    background:#111827;
    padding:15px;
    text-align:center;
    font-weight:bold;
    color:#facc15;
}

.container{
    padding:20px;
}

.card{
    background:#111827;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    border:1px solid #1f2937;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
}

.card h2{
    color:#facc15;
    margin:0 0 10px 0;
}

.card p{
    color:#9ca3af;
    font-size:14px;
}

.btn{
    display:inline-block;
    margin-top:10px;
    padding:8px 12px;
    background:#facc15;
    color:black;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
📚 Zenix Trading Blog
</header>

<div class="container">

    <div class="card">
        <h2>🔥 كيف تبدأ التداول من الصفر</h2>
        <p>تعلم الأساسيات: السوق، الشموع، وكيف تبدأ بدون خسائر كبيرة.</p>
        <a class="btn" href="#">اقرأ المقال</a>
    </div>

    <div class="card">
        <h2>🕯️ الشموع اليابانية ببساطة</h2>
        <p>تعرف كيف تقرأ السوق من خلال الشموع وتفهم الاتجاه.</p>
        <a class="btn" href="#">اقرأ المقال</a>
    </div>

    <div class="card">
        <h2>📊 الدعم والمقاومة</h2>
        <p>أهم نقطة في التداول: فين تدخل وفين تخرج.</p>
        <a class="btn" href="#">اقرأ المقال</a>
    </div>

</div>

</body>
</html>
