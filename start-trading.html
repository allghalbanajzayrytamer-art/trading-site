<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ابدأ التعلم</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#0b0f19;
    color:white;
}

header{
    background:#111827;
    padding:15px;
    text-align:center;
    color:#facc15;
}

.container{
    padding:20px;
}

.step{
    background:#111827;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
    border:1px solid #1f2937;
}

.step h3{
    color:#facc15;
    margin:0 0 10px 0;
}

.step p{
    color:#9ca3af;
    font-size:14px;
}

.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    background:#22c55e;
    color:white;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
🎓 تعلم التداول خطوة خطوة
</header>

<div class="container">

    <div class="step">
        <h3>1️⃣ فهم السوق</h3>
        <p>تعرف على كيف يتحرك السعر ولماذا يرتفع وينخفض.</p>
    </div>

    <div class="step">
        <h3>2️⃣ الشموع اليابانية</h3>
        <p>تعلم قراءة الشموع لمعرفة الاتجاه القادم.</p>
    </div>

    <div class="step">
        <h3>3️⃣ إدارة رأس المال</h3>
        <p>لا تخسر كل رأس مالك في صفقة وحدة!</p>
    </div>

    <div class="step">
        <h3>4️⃣ الدخول للسوق</h3>
        <p>تعلم كيف تدخل صفقة بأمان.</p>
    </div>

    <a class="btn" href="index.html">🚀 ارجع للرئيسية</a>

</div>

</body>
</html>
