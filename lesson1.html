<h1>📌 ما هو التداول؟</h1>

<p>
التداول هو عملية شراء وبيع العملات أو الأسهم أو العملات الرقمية بهدف الربح من فرق السعر.
</p>

<p>
مثال: تشري عملة بـ 100$ وتبيعها بـ 120$ → تربح 20$.
</p>
